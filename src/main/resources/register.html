<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign Up | Architect PM</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#2563eb",
                        "on-primary-container": "#eeefff",
                        "surface": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "on-surface-variant": "#434655",
                        "primary": "#004ac6",
                        "outline": "#737686",
                        "outline-variant": "#c3c6d7",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); box-shadow: 0 8px 30px rgb(0,0,0,0.04); }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">

    <header class="fixed top-0 w-full bg-surface-container-low z-50">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">architecture</span>
                <span class="text-2xl font-bold tracking-tighter text-slate-900 font-headline">Architect</span>
            </div>
            <div class="hidden md:flex items-center gap-6">
                <a class="text-slate-500 hover:text-blue-700 transition-colors font-headline font-semibold tracking-tight" th:href="@{/support}">Support</a>
            </div>
        </div>
    </header>

    <main class="min-h-screen pt-24 pb-16 flex items-center justify-center px-4 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full -z-10 pointer-events-none">
            <div class="absolute top-[10%] left-[5%] w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
        </div>

        <div class="w-full max-w-md">
            <div class="surface-container-lowest glass-card rounded-xl p-8 md:p-10 border border-outline-variant/10">
                <div class="mb-8 text-center md:text-left">
                    <h1 class="text-2xl font-bold tracking-tight font-headline text-on-surface mb-2">Create Your Account</h1>
                    <p class="text-on-surface-variant text-sm font-body">Design your workflow and build better software with Architect PM.</p>
                </div>

                <div th:if="${error}" class="mb-4 p-3 bg-error-container text-error rounded-md text-sm font-medium text-center">
                    <span th:text="${error}">Thông báo lỗi</span>
                </div>

                <form class="space-y-5" th:action="@{/register}" th:object="${signupRequest}" method="POST">
                    
                    <div class="space-y-1.5">
                        <label class="text-xs font-label font-medium uppercase tracking-wider text-on-surface-variant block">Full Name</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">person</span>
                            <input th:field="*{fullName}" required class="w-full pl-10 pr-4 py-2.5 bg-surface-container-low border-none rounded-md text-sm focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="Alex Rivera" type="text"/>
                        </div>
                        <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-xs text-error mt-1"></p>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-xs font-label font-medium uppercase tracking-wider text-on-surface-variant block">Work Email</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
                            <input th:field="*{email}" required class="w-full pl-10 pr-4 py-2.5 bg-surface-container-low border-none rounded-md text-sm focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="alex@company.com" type="email"/>
                        </div>
                        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-xs text-error mt-1"></p>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-xs font-label font-medium uppercase tracking-wider text-on-surface-variant block">Username</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">person_edit</span>
                            <input th:field="*{username}" required class="w-full pl-10 pr-4 py-2.5 bg-surface-container-low border-none rounded-md text-sm focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="arivera" type="text"/>
                        </div>
                        <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-xs text-error mt-1"></p>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-xs font-label font-medium uppercase tracking-wider text-on-surface-variant block">Password</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
                            <input th:field="*{password}" required class="w-full pl-10 pr-4 py-2.5 bg-surface-container-low border-none rounded-md text-sm focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="••••••••" type="password"/>
                        </div>
                        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-xs text-error mt-1"></p>
                    </div>

                    <button type="submit" class="w-full py-3 px-4 bg-primary-container text-on-primary-container font-headline font-bold rounded-md shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                        Create Account <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-sm text-on-surface-variant font-body">
                        Already have an account? 
                        <a th:href="@{/login}" class="text-primary font-semibold hover:underline decoration-blue-500 underline-offset-4 ml-1">Log In</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
